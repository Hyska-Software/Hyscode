name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Detect if Rust files changed (to skip rust job when not needed)
  # ─────────────────────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      ts: ${{ steps.filter.outputs.ts }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'apps/desktop/src-tauri/**'
              - 'apps/desktop/src-tauri/Cargo.toml'
              - 'apps/desktop/src-tauri/Cargo.lock'
            ts:
              - 'apps/**'
              - 'packages/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.jsx'
              - '**/*.json'

  # ─────────────────────────────────────────────────────────────────
  # Setup Node and cache
  # ─────────────────────────────────────────────────────────────────
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.ts == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install
        run: npm ci
      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

  # ─────────────────────────────────────────────────────────────────
  # Lint
  # ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [changes, install]
    if: needs.changes.outputs.ts == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint

  # ─────────────────────────────────────────────────────────────────
  # Typecheck
  # ─────────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: [changes, install]
    if: needs.changes.outputs.ts == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx tsc -b apps/desktop/tsconfig.json --emitDeclarationOnly
      - run: npm run typecheck

  # ─────────────────────────────────────────────────────────────────
  # Test
  # ─────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [changes, install]
    if: needs.changes.outputs.ts == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm test

  # ─────────────────────────────────────────────────────────────────
  # Rust (fmt + clippy + build) — only when Rust files changed
  # ─────────────────────────────────────────────────────────────────
  rust:
    name: Rust check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "apps/desktop/src-tauri -> target"

      - name: cargo fmt
        working-directory: apps/desktop/src-tauri
        run: cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: apps/desktop/src-tauri
        run: cargo clippy --all-targets

      - name: cargo build
        working-directory: apps/desktop/src-tauri
        run: cargo build --release

  # ─────────────────────────────────────────────────────────────────
  # Aggregate: all must pass
  # ─────────────────────────────────────────────────────────────────
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, rust]
    if: always()
    steps:
      - name: Check all required jobs
        run: |
          if [ "${{ needs.lint.result }}" = "failure" ] || \
             [ "${{ needs.lint.result }}" = "cancelled" ]; then
            echo "Lint failed"; exit 1
          fi
          if [ "${{ needs.typecheck.result }}" = "failure" ] || \
             [ "${{ needs.typecheck.result }}" = "cancelled" ]; then
            echo "Typecheck failed"; exit 1
          fi
          if [ "${{ needs.test.result }}" = "failure" ] || \
             [ "${{ needs.test.result }}" = "cancelled" ]; then
            echo "Test failed"; exit 1
          fi
          # rust job is skipped when no changes — treat as success
          if [ "${{ needs.rust.result }}" = "failure" ] || \
             [ "${{ needs.rust.result }}" = "cancelled" ]; then
            echo "Rust failed"; exit 1
          fi
          echo "All CI checks passed"
