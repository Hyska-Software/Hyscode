name: Auto-merge

on:
  pull_request:
    types: [labeled, synchronize, reopened]
  check_run:
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-merge:
    name: Auto-merge approved PRs
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.labels.*.name == contains('workflow:agent-can-merge') &&
        github.event.pull_request.draft == false
      )
    steps:
      - name: Fetch PR state
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request?.number || (await getPrNumber()),
            });
            core.exportVariable('PR_NUMBER', pr.data.number);
            core.exportVariable('PR_BASE', pr.data.base.ref);
            core.exportVariable('PR_HEAD_SHA', pr.data.head.sha);

            async function getPrNumber() {
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 1,
              });
              return prs[0]?.number;
            }

      - name: Wait for required CI checks
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const headSha = process.env.PR_HEAD_SHA;
            const required = ['CI Success'];
            const maxMinutes = 15;
            const start = Date.now();
            const timeoutMs = maxMinutes * 60_000;

            async function evaluate() {
              const { data: checks } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: headSha,
                per_page: 100,
              });
              const relevant = checks.check_runs.filter((c) =>
                required.includes(c.name) || c.name === 'CI Success'
              );
              if (relevant.length === 0) {
                return { ready: false, reason: 'no CI Success check yet' };
              }
              const failed = relevant.find(
                (c) => c.conclusion === 'failure' || c.conclusion === 'cancelled'
              );
              if (failed) {
                core.setFailed(`Required check "${failed.name}" concluded with ${failed.conclusion}.`);
                return { ready: false, reason: 'failed' };
              }
              const pending = relevant.find(
                (c) => c.status !== 'completed' && c.conclusion !== 'success' && c.conclusion !== 'skipped' && c.conclusion !== 'neutral'
              );
              if (pending) {
                return { ready: false, reason: `pending: ${pending.name}` };
              }
              const allDone = relevant.every(
                (c) => c.status === 'completed' && (c.conclusion === 'success' || c.conclusion === 'skipped' || c.conclusion === 'neutral')
              );
              if (!allDone) {
                return { ready: false, reason: 'not all checks completed' };
              }
              return { ready: true };
            }

            let lastReason = '';
            while (Date.now() - start < timeoutMs) {
              const r = await evaluate();
              if (r.ready) {
                core.info('All required CI checks passed.');
                return;
              }
              if (r.reason !== lastReason) {
                core.info(`Waiting for CI: ${r.reason}`);
                lastReason = r.reason;
              }
              await new Promise((res) => setTimeout(res, 20_000));
            }
            core.setFailed(`CI checks did not pass within ${maxMinutes} minutes.`);

      - name: Verify label still present
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const labels = pr.labels.map((l) => l.name);
            if (!labels.includes('workflow:agent-can-merge')) {
              core.setFailed('Label workflow:agent-can-merge was removed; aborting merge.');
              return;
            }

      - name: Rebase onto base
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            try {
              await github.rest.pulls.updateBranch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                expected_head_sha: process.env.PR_HEAD_SHA,
              });
              core.info('Branch rebased onto base (or already up-to-date).');
            } catch (e) {
              core.warning(`Could not rebase automatically (${e.message}). Continuing with current head.`);
            }

      - name: Merge pull request (squash)
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash',
                commit_title: `${pr.title} (#${prNumber})`,
                commit_message: `Auto-merged via workflow:agent-can-merge label.\n\nPR body:\n${pr.body || ''}`,
              });
              core.info(`Merged PR #${prNumber}.`);
            } catch (e) {
              if (e.message && e.message.includes('At least 1 approving review')) {
                core.warning('GitHub still requires an approving review; falling back to admin merge.');
                try {
                  await github.rest.pulls.merge({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: prNumber,
                    merge_method: 'squash',
                    commit_title: `${pr.title} (#${prNumber})`,
                    commit_message: `Auto-merged via workflow:agent-can-merge label (admin fallback).\n\nPR body:\n${pr.body || ''}`,
                  });
                  core.info(`Admin-merged PR #${prNumber}.`);
                } catch (e2) {
                  core.setFailed(`Admin merge failed: ${e2.message}`);
                }
              } else {
                core.setFailed(`Merge failed: ${e.message}`);
              }
            }
